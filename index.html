<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#E8002D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="F1 2026">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>F1 2026 // APEX TIMING</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Michroma&family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   APEX TIMING — F1 2026
   ═══════════════════════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red:       #E8002D;
  --red-dim:   #6B0015;
  --red-glow:  rgba(232, 0, 45, 0.35);

  --bg-0:      #07070C;
  --bg-1:      #0D0E17;
  --bg-2:      #141621;
  --bg-3:      #1B1D2A;

  --line-1:    #1C1E2D;
  --line-2:    #262839;
  --line-3:    #343648;

  --text:      #EEEEF5;
  --text-dim:  #60637A;
  --muted:     #373A4E;

  --green:     #00D47A;
  --purple:    #9B30FF;
  --gold:      #FFC421;
  --cyan:      #00D4FF;
  --amber:     #FF8C00;

  --soft:      #FF1E2D;
  --medium:    #FFE600;
  --hard:      #E8E8E8;

  --safe-top:  env(safe-area-inset-top);
  --safe-bot:  env(safe-area-inset-bottom);

  --f-logo:    'Michroma', sans-serif;
  --f-display: 'Barlow Condensed', sans-serif;
  --f-body:    'Rajdhani', sans-serif;
  --f-mono:    'JetBrains Mono', monospace;
}

html, body {
  background: var(--bg-0);
  color: var(--text);
  font-family: var(--f-body);
  height: 100%;
  overflow: hidden;
  font-feature-settings: "tnum" 1;
  -webkit-font-smoothing: antialiased;
}

/* Carbon weave texture */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    repeating-linear-gradient(45deg,  transparent, transparent 5px, rgba(255,255,255,0.009) 5px, rgba(255,255,255,0.009) 10px),
    repeating-linear-gradient(-45deg, transparent, transparent 5px, rgba(255,255,255,0.009) 5px, rgba(255,255,255,0.009) 10px);
  background-size: 20px 20px;
}

/* Top red accent bar */
body::after {
  content: "";
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--red);
  box-shadow: 0 0 18px var(--red-glow), 0 0 40px rgba(232,0,45,0.15);
  z-index: 200;
  pointer-events: none;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bot);
  position: relative;
  z-index: 2;
}

/* ── HEADER ─────────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 16px 10px;
  background: var(--bg-0);
  border-bottom: 1px solid var(--line-1);
  flex-shrink: 0;
  gap: 10px;
  position: relative;
  overflow: hidden;
}

/* Subtle vertical stripe decoration */
header::before {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 48px,
    rgba(232, 0, 45, 0.025) 48px,
    rgba(232, 0, 45, 0.025) 50px
  );
  pointer-events: none;
}

/* Red sweep under logo */
header::after {
  content: "";
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 140px;
  height: 2px;
  background: linear-gradient(90deg, var(--red) 0%, rgba(232,0,45,0.3) 70%, transparent 100%);
}

.logo {
  display: flex;
  align-items: center;
  gap: 11px;
  position: relative;
}

.logo-mark {
  width: 36px;
  height: 30px;
  background: var(--red);
  clip-path: polygon(0 0, 100% 0, 84% 100%, 0 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--f-logo);
  font-size: 10px;
  color: #fff;
  letter-spacing: 0.5px;
  padding-right: 4px;
  flex-shrink: 0;
  box-shadow: 3px 0 14px rgba(232, 0, 45, 0.45);
}

.logo-text {
  display: flex;
  flex-direction: column;
  gap: 2px;
  border-left: 1px solid var(--line-2);
  padding-left: 11px;
}

.logo-f1 {
  font-family: var(--f-logo);
  font-size: 13px;
  color: var(--text);
  letter-spacing: 2px;
  line-height: 1;
}

.logo-sub {
  font-family: var(--f-mono);
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.header-right { display: flex; align-items: center; gap: 8px; }

.icon-btn {
  background: var(--bg-2);
  border: 1px solid var(--line-2);
  color: var(--text-dim);
  width: 36px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.icon-btn:active { background: var(--bg-3); }
.icon-btn.active {
  border-color: var(--red);
  color: var(--red);
  background: rgba(232, 0, 45, 0.08);
  box-shadow: 0 0 10px rgba(232, 0, 45, 0.15);
}
.icon-btn svg { width: 16px; height: 16px; }

.sync-btn {
  background: var(--red);
  color: #fff;
  border: none;
  padding: 0 20px 0 14px;
  height: 34px;
  font-family: var(--f-body);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 2px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: background 0.15s, box-shadow 0.15s;
  -webkit-tap-highlight-color: transparent;
  clip-path: polygon(0 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
  text-transform: uppercase;
  box-shadow: 0 2px 16px rgba(232, 0, 45, 0.35);
}
.sync-btn:active { background: #B5001F; box-shadow: none; }
.sync-btn.syncing {
  background: var(--line-2);
  color: var(--text-dim);
  pointer-events: none;
  box-shadow: none;
}
.sync-btn svg { width: 14px; height: 14px; }
.sync-btn.syncing svg { animation: spin 1s linear infinite; }

@keyframes spin { to { transform: rotate(360deg); } }

/* ── PROGRESS ────────────────────────────────────────────────── */
.progress-bar { height: 2px; background: var(--bg-1); flex-shrink: 0; overflow: hidden; }
.progress-bar-fill {
  height: 100%;
  width: 0%;
  background: var(--red);
  transition: width 0.3s;
  box-shadow: 0 0 8px var(--red-glow);
}
.progress-bar-fill.indeterminate {
  width: 35%;
  animation: slide 1.1s infinite cubic-bezier(0.4, 0, 0.6, 1);
  background: linear-gradient(90deg, transparent, var(--red), transparent);
}
@keyframes slide { 0% { transform: translateX(-150%); } 100% { transform: translateX(400%); } }

/* ── STAT STRIP ──────────────────────────────────────────────── */
.stat-strip {
  display: flex;
  background: var(--bg-1);
  border-bottom: 1px solid var(--line-1);
  flex-shrink: 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.stat-strip::-webkit-scrollbar { display: none; }

.stat-card {
  flex: 1;
  min-width: 100px;
  padding: 10px 14px 11px;
  border-right: 1px solid var(--line-1);
  position: relative;
  overflow: hidden;
}
.stat-card:last-child { border-right: none; }

/* Bottom accent line */
.stat-card::after {
  content: "";
  position: absolute;
  bottom: 0; left: 0;
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, var(--red) 0%, transparent 55%);
  opacity: 0.45;
}

.stat-lbl {
  font-family: var(--f-body);
  font-size: 9px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 4px;
  font-weight: 700;
}

.stat-val {
  font-family: var(--f-display);
  font-weight: 800;
  font-size: 20px;
  color: var(--text);
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -0.5px;
}
.stat-val.accent { color: var(--red); }
.stat-val.gold   { color: var(--gold); }
.stat-val .unit  {
  font-family: var(--f-mono);
  font-size: 9px;
  color: var(--text-dim);
  margin-left: 3px;
  font-weight: 500;
  letter-spacing: 0;
}

/* ── TAB BAR ─────────────────────────────────────────────────── */
.tab-bar {
  display: flex;
  background: var(--bg-0);
  border-bottom: 1px solid var(--line-1);
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.tab-bar::-webkit-scrollbar { display: none; }

.tab {
  flex: 1;
  min-width: 60px;
  padding: 9px 6px 8px;
  text-align: center;
  font-family: var(--f-body);
  font-weight: 700;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-dim);
  cursor: pointer;
  border-top: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  white-space: nowrap;
  text-transform: uppercase;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}

.tab svg { width: 15px; height: 15px; opacity: 0.45; transition: opacity 0.15s; }
.tab.active {
  color: var(--text);
  border-top-color: var(--red);
  background: rgba(232, 0, 45, 0.05);
}
.tab.active svg { opacity: 1; color: var(--red); }
.tab:not(.active):active { background: var(--bg-1); }

/* ── PANELS ──────────────────────────────────────────────────── */
.panels { flex: 1; overflow: hidden; position: relative; }
.panel {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: none;
  padding-bottom: 16px;
}
.panel.active { display: block; }

/* ── TABLES ──────────────────────────────────────────────────── */
.f1-table { width: 100%; border-collapse: collapse; font-size: 13px; }

.f1-table thead th {
  position: sticky;
  top: 0;
  background: var(--bg-1);
  color: var(--text-dim);
  font-family: var(--f-body);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 10px 12px;
  text-align: left;
  border-bottom: 1px solid var(--line-2);
  z-index: 2;
}
.f1-table thead th:first-child {
  border-left: 2px solid var(--red);
}
.f1-table thead th.center { text-align: center; }
.f1-table thead th.right  { text-align: right; }

.f1-table tbody tr {
  border-bottom: 1px solid var(--line-1);
  transition: background 0.1s;
}
.f1-table tbody tr:active { background: rgba(232, 0, 45, 0.04); }

.f1-table td { padding: 11px 12px; vertical-align: middle; }

/* Position cell */
.pos-cell {
  width: 40px;
  text-align: center;
  font-family: var(--f-display);
  font-size: 17px;
  font-weight: 800;
  color: var(--text-dim);
  letter-spacing: -0.5px;
}
.pos-cell.p1 { color: var(--gold); }
.pos-cell.p2 { color: #C8C8D8; }
.pos-cell.p3 { color: #C08040; }

/* Driver cell with glowing team color bar */
.driver-cell {
  position: relative;
  padding-left: 20px !important;
}
.driver-cell::before {
  content: "";
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 26px;
  background: var(--team-color, var(--muted));
  border-radius: 2px;
  box-shadow: 0 0 8px var(--team-color, transparent);
  opacity: 0.85;
}

.driver-name {
  font-family: var(--f-display);
  font-weight: 700;
  font-size: 15px;
  line-height: 1.1;
  letter-spacing: 0.3px;
  color: var(--text);
  text-transform: uppercase;
}
.driver-team {
  font-family: var(--f-body);
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 2px;
  letter-spacing: 0.8px;
  font-weight: 600;
  text-transform: uppercase;
}

.pts-cell {
  text-align: right;
  font-family: var(--f-display);
  font-weight: 800;
  font-size: 16px;
  color: var(--text);
  white-space: nowrap;
  letter-spacing: -0.3px;
}
.pts-cell .lbl {
  color: var(--text-dim);
  font-family: var(--f-mono);
  font-size: 8px;
  font-weight: 500;
  margin-left: 2px;
  letter-spacing: 0;
}
.pts-cell.lead { color: var(--gold); }

.wins-cell {
  text-align: center;
  font-family: var(--f-mono);
  font-weight: 600;
  color: var(--text-dim);
  font-size: 13px;
}
.wins-cell.has-wins { color: var(--text); }

.dnf { opacity: 0.35; }

.fl-badge {
  display: inline-block;
  background: rgba(155, 48, 255, 0.12);
  border: 1px solid var(--purple);
  color: var(--purple);
  padding: 1px 5px;
  font-family: var(--f-mono);
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-left: 6px;
  vertical-align: middle;
}

/* ── ROUND NAV ───────────────────────────────────────────────── */
.round-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line-1);
  background: var(--bg-1);
  position: sticky;
  top: 0;
  z-index: 3;
}
.round-select {
  flex: 1;
  background: var(--bg-2);
  color: var(--text);
  border: 1px solid var(--line-2);
  padding: 8px 10px;
  font-family: var(--f-body);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.3px;
  -webkit-appearance: none;
  appearance: none;
}
.round-select:focus { outline: none; border-color: var(--red); }

.round-nav {
  background: var(--bg-2);
  border: 1px solid var(--line-2);
  color: var(--text);
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
  font-family: var(--f-display);
  font-size: 20px;
  font-weight: 700;
  transition: all 0.12s;
}
.round-nav:active { background: var(--bg-3); border-color: var(--red); color: var(--red); }

/* ── BADGES ──────────────────────────────────────────────────── */
.badge {
  display: inline-block;
  padding: 3px 8px;
  font-family: var(--f-body);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  border: 1px solid;
}
.badge-done    { color: var(--green);  border-color: var(--green);  background: rgba(0,212,122,0.08); }
.badge-next    { color: var(--red);    border-color: var(--red);    background: rgba(232,0,45,0.1); animation: pulse 1.5s ease-in-out infinite; }
.badge-sprint  { color: var(--purple); border-color: var(--purple); background: rgba(155,48,255,0.08); }
.badge-upcoming {
  color: var(--text-dim);
  font-family: var(--f-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.3px;
}

/* ── STATUS BAR ──────────────────────────────────────────────── */
.status-bar {
  font-family: var(--f-mono);
  font-size: 9px;
  color: var(--text-dim);
  padding: 6px 14px;
  border-top: 1px solid var(--line-1);
  background: var(--bg-0);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 28px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
}
.status-dot {
  width: 5px;
  height: 5px;
  background: var(--muted);
  flex-shrink: 0;
  border-radius: 50%;
}
.status-dot.green { background: var(--green); box-shadow: 0 0 7px var(--green); }
.status-dot.red   { background: var(--red);   box-shadow: 0 0 7px var(--red); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* ── TOAST ───────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: calc(48px + var(--safe-bot));
  left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: var(--bg-2);
  border: 1px solid var(--line-2);
  border-left: 3px solid var(--red);
  color: var(--text);
  padding: 10px 18px;
  font-family: var(--f-body);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  max-width: 320px;
  width: calc(100vw - 32px);
  text-align: center;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 999;
  pointer-events: none;
  text-transform: uppercase;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── EMPTY STATE ─────────────────────────────────────────────── */
.empty {
  text-align: center;
  padding: 60px 30px;
  color: var(--text-dim);
  font-family: var(--f-body);
  font-size: 12px;
  letter-spacing: 1.5px;
  font-weight: 600;
  text-transform: uppercase;
}
.empty-glyph {
  width: 40px;
  height: 40px;
  margin: 0 auto 14px;
  border: 1px solid var(--line-2);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--line-3);
}
.empty-glyph svg { width: 20px; height: 20px; }

/* ══════════════ STRATEGY TAB ════════════════════════════════ */
.strategy-panel {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.api-status {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg-1);
  border: 1px solid var(--line-1);
  border-left: 3px solid var(--line-2);
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.8px;
  text-transform: uppercase;
}
.api-status.online  { border-left-color: var(--green); color: var(--text); }
.api-status.offline { border-left-color: var(--red);   color: var(--text); }

.api-dot {
  width: 7px;
  height: 7px;
  background: var(--muted);
  flex-shrink: 0;
  border-radius: 50%;
}
.api-dot.online  { background: var(--green); box-shadow: 0 0 8px var(--green); }
.api-dot.offline { background: var(--red);   box-shadow: 0 0 8px var(--red); }
.api-dot.loading { background: var(--amber); animation: pulse 1s infinite; }

.strategy-form {
  background: var(--bg-1);
  border: 1px solid var(--line-1);
  padding: 16px;
}
.form-title {
  font-family: var(--f-body);
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2.5px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line-1);
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
}
.form-title::before {
  content: "";
  width: 8px;
  height: 8px;
  background: var(--red);
  flex-shrink: 0;
}
.form-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex: 1;
}
.form-label {
  font-family: var(--f-body);
  font-size: 9px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 700;
}
.form-select, .form-input {
  background: var(--bg-2);
  color: var(--text);
  border: 1px solid var(--line-2);
  padding: 9px 10px;
  font-family: var(--f-body);
  font-size: 14px;
  font-weight: 600;
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  transition: border-color 0.15s, background 0.15s;
}
.form-select:focus, .form-input:focus {
  outline: none;
  border-color: var(--red);
  background: var(--bg-3);
}

.analyze-btn {
  background: var(--red);
  color: #fff;
  border: none;
  padding: 14px;
  font-family: var(--f-body);
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 3px;
  cursor: pointer;
  width: 100%;
  text-transform: uppercase;
  transition: background 0.15s, box-shadow 0.15s;
  -webkit-tap-highlight-color: transparent;
  margin-top: 6px;
  clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
  box-shadow: 0 4px 22px rgba(232, 0, 45, 0.3);
}

<script>
// CONFIG
const API     = "https://api.jolpi.ca/ergast/f1/2026";
const SEASON  = 2026;
const ML_API  = "https://f1-strategy-api-production.up.railway.app";

// TEAM COLORS
const TEAM_COLORS = {
  "McLaren": "#FF8000", "Ferrari": "#DC0000", "Mercedes": "#27F4D2",
  "Red Bull": "#3671C6", "Williams": "#64C4FF", "Aston Martin": "#358C75",
  "Alpine": "#FF87BC", "Haas": "#B0B0B0", "RB": "#6692FF",
  "Audi": "#FF2D55", "Cadillac": "#4A90D9",
};
function teamColor(name) {
  for (const [k, v] of Object.entries(TEAM_COLORS))
    if (name && name.includes(k)) return v;
  return "#666";
}

// STATE
let state = {
  driverStandings: [], constructorStandings: [],
  calendar: [], raceResults: {}, currentRound: 1,
  lastSync: null, syncing: false, notificationsEnabled: false, watchInterval: null,
  mlApiOnline: false,
};

// API
async function apiFetch(path) {
  const r = await fetch(`${API}/${path}`, { cache: "no-store" });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return (await r.json()).MRData;
}

// SYNC
async function syncNow() {
  if (state.syncing) return;
  setSyncing(true);
  setStatus("SYNCING // JOLPICA API", "red");
  try {
    await Promise.all([loadDriverStandings(), loadConstructorStandings(), loadCalendar()]);
    const latestRound = state.calendar.filter(r => r.hasResult).length;
    if (latestRound > 0) {
      await loadRaceResults(latestRound);
      const key = `f1_seen_r${latestRound}`;
      const wasNew = !localStorage.getItem(key);
      if (wasNew) {
        localStorage.setItem(key, "1");
        const race = state.calendar.find(r => r.round == latestRound);
        if (race && wasNew && state.lastSync)
          pushNotification(`🏁 ${race.name} results are in!`, "Tap to see standings & results.");
      }
    }
    updateAllViews();
    state.lastSync = new Date();
    const t = state.lastSync.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    setStatus(`SYNCED // ${t}`, "green");
    showToast("✓ TELEMETRY UPDATED");
  } catch(e) {
    setStatus(`SYNC FAILED // ${e.message}`, "");
    showToast("⚠ CONNECTION LOST");
  } finally {
    setSyncing(false);
  }
}

async function loadDriverStandings() {
  const d = await apiFetch(`driverStandings.json`);
  state.driverStandings = d?.StandingsTable?.StandingsLists?.[0]?.DriverStandings ?? [];
}
async function loadConstructorStandings() {
  const d = await apiFetch(`constructorStandings.json`);
  state.constructorStandings = d?.StandingsTable?.StandingsLists?.[0]?.ConstructorStandings ?? [];
}
async function loadCalendar() {
  const d = await apiFetch(`races.json?limit=30`);
  const races = d?.RaceTable?.Races ?? [];
  const resultsData = await apiFetch(`results.json?limit=50`);
  const doneRounds = new Set((resultsData?.RaceTable?.Races ?? []).map(r => parseInt(r.round)));
  state.calendar = races.map(r => ({
    round: parseInt(r.round), name: r.raceName,
    circuit: r.Circuit?.circuitName ?? "", country: r.Circuit?.Location?.country ?? "",
    date: r.date, isSprint: !!r.Sprint, hasResult: doneRounds.has(parseInt(r.round)),
  }));
}
async function loadRaceResults(round) {
  if (state.raceResults[round]) return;
  const d = await apiFetch(`${round}/results.json?limit=25`);
  state.raceResults[round] = (d?.RaceTable?.Races ?? [])[0]?.Results ?? [];
}

// RENDER
function updateAllViews() {
  renderStats(); renderDrivers(); renderTeams();
  renderCalendar(); renderRoundSelect(); renderResults(state.currentRound);
}

function renderStats() {
  const d = state.driverStandings[0];
  if (d) {
    document.getElementById("statLeader").textContent = d.Driver.familyName.toUpperCase();
    document.getElementById("statPts").innerHTML = `${d.points}<span class="unit">PTS</span>`;
  }
  const done = state.calendar.filter(r => r.hasResult).length;
  document.getElementById("statRounds").innerHTML = `${done}<span class="unit">/ ${state.calendar.length || 24}</span>`;
  const next = state.calendar.find(r => !r.hasResult);
  if (next) document.getElementById("statNext").textContent = `R${String(next.round).padStart(2,'0')}`;
}

function renderDrivers() {
  const body = document.getElementById("driverBody");
  if (!state.driverStandings.length) {
    body.innerHTML = emptyRow("No standings yet. Tap SYNC to load data.");
    return;
  }

// RECOMMENDATION LOGIC
function pickRecommendation(data) {
  const compounds = ["SOFT", "MEDIUM", "HARD"];
  const scored = compounds.map(c => {
    const cd = data.compounds[c];
    if (!cd) return null;
    const pit = cd.pit_window;
    const optimal = pit.optimal_lap ?? 30;
    const score = optimal - (cd.total_degradation * 1.5);
    return { compound: c, score, cd };
  }).filter(Boolean);
  scored.sort((a, b) => b.score - a.score);
  return scored[0];
}

// DEGRADATION CURVE CHART
function renderDegChart(data) {
  const compounds = ["SOFT", "MEDIUM", "HARD"];
  const colors = { SOFT: "#ff1e2d", MEDIUM: "#ffe600", HARD: "#e5e5e5" };

  const series = {};
  let maxLap = 0, maxDelta = 0, minDelta = 0;

  compounds.forEach(c => {
    const cd = data.compounds[c];
    if (!cd || !cd.stint_data) return;
    const pts = cd.stint_data.map((d, i) => ({
      lap: i + 1,
      delta: d.predicted_delta ?? 0,
    }));
    series[c] = pts;
    pts.forEach(p => {
      if (p.lap > maxLap) maxLap = p.lap;
      if (p.delta > maxDelta) maxDelta = p.delta;
      if (p.delta < minDelta) minDelta = p.delta;
    });
  });

  if (!maxLap) return "";

  const W = 340, H = 180;
  const PAD = { top: 12, right: 14, bottom: 22, left: 36 };
  const plotW = W - PAD.left - PAD.right;
  const plotH = H - PAD.top - PAD.bottom;

  const yMax = Math.ceil(maxDelta + 0.5);
  const yMin = Math.floor(Math.min(minDelta, 0));
  const yRange = yMax - yMin || 1;

  const xScale = (lap) => PAD.left + ((lap - 1) / Math.max(1, maxLap - 1)) * plotW;
  const yScale = (d)   => PAD.top + ((yMax - d) / yRange) * plotH;

  const yTicks = 4;
  let gridLines = "";
  for (let i = 0; i <= yTicks; i++) {
    const v = yMin + (yRange * i / yTicks);
    const y = yScale(v);
    gridLines += `<line x1="${PAD.left}" y1="${y}" x2="${W - PAD.right}" y2="${y}" stroke="#242430" stroke-width="1" stroke-dasharray="2,3"/>`;
    gridLines += `<text x="${PAD.left - 6}" y="${y + 3}" text-anchor="end" font-family="JetBrains Mono" font-size="8" fill="#8a8a9a" font-weight="600">${v.toFixed(1)}</text>`;
  }

  let xTicks = "";
  const xStep = Math.max(1, Math.ceil(maxLap / 6));
  for (let lap = 1; lap <= maxLap; lap += xStep) {
    const x = xScale(lap);
    xTicks += `<text x="${x}" y="${H - 6}" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#8a8a9a" font-weight="600">L${lap}</text>`;
  }

  const zeroY = yScale(0);
  const zeroLine = `<line x1="${PAD.left}" y1="${zeroY}" x2="${W - PAD.right}" y2="${zeroY}" stroke="#4a4a5e" stroke-width="1"/>`;

  let paths = "";
  let pitMarkers = "";

  compounds.forEach(c => {
    const pts = series[c];
    if (!pts || !pts.length) return;
    const color = colors[c];
    const d = pts.map((p, i) => {
      const x = xScale(p.lap).toFixed(1);
      const y = yScale(p.delta).toFixed(1);
      return `${i === 0 ? 'M' : 'L'}${x},${y}`;
    }).join(" ");

    paths += `<path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity="0.95"/>`;

    const cd = data.compounds[c];
    if (cd?.pit_window?.optimal_lap) {
      const pitLap = cd.pit_window.optimal_lap;
      const pitPt = pts.find(p => p.lap === pitLap);
      if (pitPt) {
        const x = xScale(pitPt.lap);
        const y = yScale(pitPt.delta);
        pitMarkers += `
          <circle cx="${x}" cy="${y}" r="5" fill="${color}" stroke="#0c0c0e" stroke-width="2"/>
          <circle cx="${x}" cy="${y}" r="9" fill="none" stroke="${color}" stroke-width="1" opacity="0.4"/>
        `;
      }
    }
  });

  const yLabel = `<text x="8" y="${PAD.top + plotH/2}" font-family="JetBrains Mono" font-size="8" fill="#8a8a9a" font-weight="600" text-anchor="middle" transform="rotate(-90, 8, ${PAD.top + plotH/2})" letter-spacing="1">DELTA (s)</text>`;

  const svg = `
    <svg class="deg-chart-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      ${gridLines}
      ${zeroLine}
      ${xTicks}
      ${yLabel}
      ${paths}
      ${pitMarkers}
    </svg>
  `;

  return `
    <div class="deg-chart-container">
      <div class="chart-header">
        <div class="chart-title">Predicted Degradation</div>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-swatch SOFT"></div>Soft</div>
          <div class="legend-item"><div class="legend-swatch MEDIUM"></div>Medium</div>
          <div class="legend-item"><div class="legend-swatch HARD"></div>Hard</div>
        </div>
      </div>
      ${svg}
    </div>
  `;
}

function renderStrategyResults(data, raceLaps, currentLap, trackTemp, position) {
  const results = document.getElementById("strategyResults");
  const compounds = ["SOFT", "MEDIUM", "HARD"];
  const compoundColors = { SOFT: "#ff1e2d", MEDIUM: "#ffe600", HARD: "#e5e5e5" };

  const rec = pickRecommendation(data);
  const recPit = rec.cd.pit_window;
  const recText = recPit.optimal_lap
    ? `PIT <span class="lap-range">L${recPit.window_start}–${recPit.window_end}</span>`
    : `<span class="hold">HOLD STINT</span>`;

  const reasoning = recPit.optimal_lap
    ? `Model projects ${rec.cd.total_degradation.toFixed(2)}s total degradation. Optimal pit window opens at lap ${recPit.optimal_lap}.`
    : `Tires managing ${rec.cd.total_degradation.toFixed(2)}s degradation — stint can continue.`;

  const chart = renderDegChart(data);

  const cards = compounds.map(compound => {
    const cd  = data.compounds[compound];
    if (!cd) return "";
    const pit = cd.pit_window;
    const deltas = cd.stint_data.map(d => d.predicted_delta);
    const lat10  = deltas[9]  ?? null;
    const lat20  = deltas[19] ?? null;
    const color  = compoundColors[compound];
    const isRec  = compound === rec.compound;

    const deltaClass = (v) => v === null ? "" : Math.abs(v) < 0.5 ? "good" : Math.abs(v) < 1.5 ? "warn" : "bad";
    const fmtDelta = (v) => v === null ? "—" : `${v >= 0 ? '+' : ''}${v.toFixed(2)}`;

    const pitText = pit.optimal_lap
      ? `PIT <span class="lap-range">L${pit.window_start}–${pit.window_end}</span>`
      : `<span class="hold">HOLD</span>`;

    return `
      <div class="compound-card ${isRec ? 'recommended' : ''}" style="--compound-color:${color}">
        <div class="compound-card-header">
          <div class="compound-pill ${compound}">${compound}</div>
          <div class="pit-window-badge">${pitText}</div>
        </div>
        <div class="compound-stats">
          <div class="compound-stat">
            <div class="compound-stat-lbl">Δ Lap 10</div>
            <div class="compound-stat-val ${deltaClass(lat10)}">${fmtDelta(lat10)}<span class="unit">s</span></div>
          </div>
          <div class="compound-stat">
            <div class="compound-stat-lbl">Δ Lap 20</div>
            <div class="compound-stat-val ${deltaClass(lat20)}">${fmtDelta(lat20)}<span class="unit">s</span></div>
          </div>
          <div class="compound-stat">
            <div class="compound-stat-lbl">Total Deg</div>
            <div class="compound-stat-val ${deltaClass(cd.total_degradation)}">${cd.total_degradation.toFixed(2)}<span class="unit">s</span></div>
          </div>
        </div>
      </div>`;
  }).join("");

  const lapsLeft = (raceLaps ?? 57) - (currentLap ?? 1);
  results.innerHTML = `
    <div class="engineer-briefing" id="engineerBriefing">
      <div class="briefing-header">
        <div class="briefing-dot loading"></div>
        <span class="briefing-label">Race Engineer</span>
      </div>
      <div class="briefing-text loading-text">Computing strategy briefing…</div>
    </div>
    <div class="recommendation">
      <div class="rec-label">Optimal Strategy // ${data.track} // ${lapsLeft} laps remaining</div>
      <div class="rec-answer">
        <span class="rec-compound ${rec.compound}">${rec.compound}</span>
        <span class="rec-pit">${recText}</span>
      </div>
      <div class="rec-reasoning">${reasoning}</div>
    </div>
    ${chart}
    <div class="section-label">Compound Breakdown</div>
    <div class="compound-cards">${cards}</div>
  `;
}

  state.notificationsEnabled = perm === "granted";
  document.getElementById("notifBtn").classList.toggle("active", state.notificationsEnabled);
  if (state.notificationsEnabled) { showToast("🔔 ALERTS ONLINE"); startWatchMode(); }
  else showToast("NOTIFICATIONS BLOCKED");

  if (!state.notificationsEnabled) return;
  try { new Notification(title, { body, icon: "./icon-192.png" }); } catch {}
}

  if (state.notificationsEnabled) {

  } else { await requestNotifications(); }
});
function startWatchMode() {
  if (state.watchInterval) return;
  state.watchInterval = setInterval(syncNow, 10 * 60 * 1000);
